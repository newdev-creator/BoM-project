services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: bomdb
      POSTGRES_USER: bomuser
      POSTGRES_PASSWORD: bompass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bomuser -d bomdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py makemigrations &&
              python manage.py migrate --noinput &&
              python manage.py seed_bom &&
              python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://bomuser:bompass@db:5432/bomdb
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      - VITE_API_URL=http://localhost:5173
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
